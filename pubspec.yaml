name: soyyo
description: Aplicativo para gerenciar garantias de produtos, com fotos de notas fiscais e notificações de vencimento.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Database
  sqflite: ^2.3.3+1
  sqflite_common_ffi_web: ^0.4.3+2
  path: ^1.9.0
  path_provider: ^2.1.3

  # Photos
  image_picker: ^1.1.2

  # Notifications (Android only)
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4

  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.1
  permission_handler: ^11.3.1
  shared_preferences: ^2.3.2

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
